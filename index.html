<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uma Musume Track Selector</title>
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="stylesheet" href="style.css">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://darkred1145.github.io/uma-racetrack-selector/">
    <meta property="og:title" content="Uma Musume Track Selector 🏆">
    <meta property="og:description" content="A fan-made tool to randomize racetracks and conditions for Uma Musume.">
    <meta property="og:image" content="https://darkred1145.github.io/uma-racetrack-selector/social-preview.png">

    <meta name="theme-color" content="#10b981">
</head>
<body>

<canvas id="confetti"></canvas>

<div class="dashboard">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <h1>Uma Musume<br>Track Selector</h1>
            </div>
            <button id="muteBtn" class="icon-btn" aria-label="Toggle Sound" title="Toggle Sound">🔊</button>
        </div>

        <div class="scroll-area">
            <div class="control-group">
                <span class="label">Theme</span>
                <select class="theme-select" id="themeSelect">
                    <option value="default">Default (Dark)</option>
                    <option value="ram">Ram (Pink/White)</option>
                    <option value="rem">Rem (Blue/White)</option>
                    <option value="miku">Miku (Teal/Dark)</option>
                    <option value="teto">Teto (Red/Charcoal)</option>
                    <option value="cappuchin">Cappuchin (Coffee)</option>
                    <option value="macchiato">Macchiato (Pastel/Dark)</option>
                </select>
            </div>

            <div class="control-group">
                <span class="label">Tournament Settings ⚙️</span>
                
                <div style="display: flex; gap: 10px; margin-bottom: 8px;">
                    <div style="flex: 1;">
                        <span class="label" style="font-size: 0.75rem; margin-bottom: 2px;">Season</span>
                        <input type="number" id="tourneySeason" value="3" min="1" class="theme-select" style="padding: 5px;">
                    </div>
                    <div style="flex: 1;">
                        <span class="label" style="font-size: 0.75rem; margin-bottom: 2px;">Open #</span>
                        <input type="number" id="tourneyOpen" value="12" min="1" class="theme-select" style="padding: 5px;">
                    </div>
                </div>

                <div style="margin-bottom: 8px;">
                    <span class="label" style="font-size: 0.75rem; margin-bottom: 2px;">Date & Time</span>
                    <input type="datetime-local" id="tourneyTime" class="theme-select" style="padding: 5px;">
                </div>

                <select id="weatherMode" class="theme-select" style="margin-bottom: 8px;">
                    <option value="normal">Weather: Normal (Random)</option>
                    <option value="favored" selected>Weather: Favored (Good)</option>
                    <option value="madness">Weather: Madness (Bad)</option>
                </select>

                <select id="tourneyMode" class="theme-select" style="margin-bottom: 8px;">
                    <option value="classic">Format: Racc Open (Classic Ban)</option>
                    <option value="draft">Format: Racc Open (Uma Draft)</option>
                    <option value="neuro" disabled>Format: Neuro Cup (WIP)</option>
                </select>

                <select id="scenarioSelect" class="theme-select">
                    <option value="aoharu">Scenario: URA / Aoharu Hai</option>
                    <option value="climax">Scenario: Climax (MANT)</option>
                </select>
            </div>
            <div class="control-group">
                <span class="label">Surface</span>
                <div class="chip-grid" id="terrainFilter">
                    <label class="chip"><input type="checkbox" value="Turf" checked><span>Turf</span></label>
                    <label class="chip"><input type="checkbox" value="Dirt" checked><span>Dirt</span></label>
                </div>
            </div>
            <div class="control-group">
                <span class="label">Distance</span>
                <div class="chip-grid" id="catFilter">
                    <label class="chip"><input type="checkbox" value="Sprint" checked><span>Sprint</span></label>
                    <label class="chip"><input type="checkbox" value="Mile" checked><span>Mile</span></label>
                    <label class="chip"><input type="checkbox" value="Medium" checked><span>Medium</span></label>
                    <label class="chip"><input type="checkbox" value="Long" checked><span>Long</span></label>
                </div>
            </div>
            <div class="control-group">
                <span class="label">Direction</span>
                <div class="chip-grid" id="dirFilter">
                    <label class="chip"><input type="checkbox" value="Right" checked><span>Right</span></label>
                    <label class="chip"><input type="checkbox" value="Left" checked><span>Left</span></label>
                    <label class="chip"><input type="checkbox" value="Stretch" checked><span>Straight</span></label>
                </div>
            </div>
            <div class="control-group">
                <span class="label">Track Capacity (Max Runners)</span>
                <div class="chip-grid" id="capFilter">
                    <label class="chip"><input type="checkbox" value="18" checked><span>18</span></label>
                    <label class="chip"><input type="checkbox" value="16" checked><span>16</span></label>
                    <label class="chip"><input type="checkbox" value="15" checked><span>15</span></label>
                    <label class="chip"><input type="checkbox" value="14" checked><span>14</span></label>
                </div>
            </div>
        </div>
        
        <div class="sidebar-footer">
            <button class="roll-btn" id="rollBtn">ROLL TRACK</button>
            <footer class="credits">
                Preview Art by <a href="https://www.pixiv.net/en/users/312420" target="_blank">@新米(ｱｯﾃﾝﾎﾞﾛｰP)</a>
            </footer>
        </div>
    </aside>

    <main class="main-stage" id="mainStage">
        <h2 class="track-display" id="resultTitle">READY</h2>
        <button id="copyBtn" class="copy-btn" style="display: none;">📋 Copy Setup</button>
        <div class="meta-tags" id="resultMeta"></div>
        
        <div class="track-img-container" id="trackImgBox">
            <div class="gate-door left"></div>
            <div class="gate-door right"></div>
            <div id="imgTarget"></div>
        </div>
        
        <div class="conditions" id="resultCond"></div>

        <div id="trackHistoryDisplay" class="track-history" style="margin-top: 15px; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid #eab308; border-radius: 8px; font-size: 0.95em; color: #fef08a; display: none; text-align: center;">
            </div>

    </main>
</div>

<script src="js/data.js"></script>
<script src="js/history.js"></script> 
<script src="js/app.js"></script>
</body>
</html>
